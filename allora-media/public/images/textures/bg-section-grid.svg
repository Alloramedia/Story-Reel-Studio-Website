<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(101,178,7,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#grid)"/>
  <!-- Subtle diagonal accent lines -->
  <line x1="0" y1="100" x2="100" y2="0" stroke="rgba(101,178,7,0.025)" stroke-width="0.5"/>
  <line x1="20" y1="100" x2="100" y2="20" stroke="rgba(101,178,7,0.015)" stroke-width="0.5"/>
</svg>
