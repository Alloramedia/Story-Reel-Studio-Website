<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="60" viewBox="0 0 1440 60" preserveAspectRatio="none">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0a120a"/>
    </linearGradient>
    <pattern id="headerTex" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Micro diagonal lines -->
      <line x1="0" y1="60" x2="60" y2="0" stroke="rgba(101,178,7,0.03)" stroke-width="0.5"/>
      <line x1="20" y1="60" x2="60" y2="20" stroke="rgba(101,178,7,0.02)" stroke-width="0.4"/>
      <line x1="40" y1="60" x2="60" y2="40" stroke="rgba(101,178,7,0.015)" stroke-width="0.3"/>
    </pattern>
  </defs>
  <rect width="1440" height="60" fill="url(#headerBg)"/>
  <rect width="1440" height="60" fill="url(#headerTex)"/>
  <!-- Bottom edge glow -->
  <line x1="0" y1="59.5" x2="1440" y2="59.5" stroke="rgba(101,178,7,0.1)" stroke-width="1"/>
</svg>
