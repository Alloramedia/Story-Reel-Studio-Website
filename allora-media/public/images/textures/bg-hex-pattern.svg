<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="hexGrid" x="0" y="0" width="50" height="43.3" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
      <!-- Hexagonal grid pattern -->
      <polygon points="25,0 50,14.4 50,28.9 25,43.3 0,28.9 0,14.4" fill="none" stroke="rgba(101,178,7,0.03)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="hexFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(101,178,7,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#hexGrid)"/>
  <circle cx="100" cy="100" r="80" fill="url(#hexFade)"/>
</svg>
