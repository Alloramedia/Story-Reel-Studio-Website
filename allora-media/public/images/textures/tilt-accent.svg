<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="tiltAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(101,178,7,0.08)"/>
      <stop offset="100%" stop-color="rgba(101,178,7,0)"/>
    </linearGradient>
  </defs>
  <!-- Tilted rectangle accent -->
  <rect x="50" y="50" width="300" height="300" rx="20" fill="url(#tiltAccent)" transform="rotate(-12 200 200)"/>
  <!-- Inner tilted border -->
  <rect x="80" y="80" width="240" height="240" rx="16" fill="none" stroke="rgba(101,178,7,0.06)" stroke-width="1" transform="rotate(-12 200 200)"/>
  <!-- Diagonal accent lines -->
  <line x1="100" y1="300" x2="300" y2="100" stroke="rgba(101,178,7,0.04)" stroke-width="0.8" transform="rotate(-12 200 200)"/>
  <line x1="140" y1="300" x2="340" y2="100" stroke="rgba(101,178,7,0.025)" stroke-width="0.6" transform="rotate(-12 200 200)"/>
</svg>
