<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="100" viewBox="0 0 1440 100" preserveAspectRatio="none">
  <defs>
    <linearGradient id="tiltGradUp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="40%" stop-color="#0e1c11"/>
      <stop offset="60%" stop-color="#131E13"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>
  <!-- Angled divider — goes from lower-left to top-right -->
  <polygon points="0,60 1440,0 1440,100 0,100" fill="url(#tiltGradUp)"/>
  <!-- Green accent line along the angle -->
  <line x1="0" y1="60" x2="1440" y2="0" stroke="rgba(101,178,7,0.12)" stroke-width="1"/>
</svg>
